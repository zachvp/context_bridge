name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f tests/Dockerfile -t context-bridge-test .

      - name: Run tests
        run: docker run --rm context-bridge-test
